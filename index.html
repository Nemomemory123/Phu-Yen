<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phú Yên · Bản đồ du lịch</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f4ef;
    --surface: #ffffff;
    --text: #1a1a1a;
    --muted: #7a7670;
    --border: #e4e0d8;
    --food: #c0392b;
    --play: #1a6b8a;
    --accent: #d4a843;
    --sidebar-w: 360px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Be Vietnam Pro', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* HEADER */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; height: 52px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 1000; }
  .logo { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--text); letter-spacing: 0.5px; }
  .logo span { color: var(--accent); }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .btn { font-family: 'Be Vietnam Pro', sans-serif; font-size: 13px; font-weight: 500; padding: 7px 14px; border-radius: 6px; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: var(--text); color: #fff; }
  .btn-primary:hover { background: #333; }
  .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-outline:hover { background: var(--bg); }

  /* LAYOUT */
  .app { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  .sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }

  .filter-section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .filter-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .filter-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .chip { font-size: 12px; font-weight: 500; padding: 5px 11px; border-radius: 20px; cursor: pointer; border: 1px solid var(--border); color: var(--muted); background: var(--bg); transition: all 0.15s; user-select: none; }
  .chip:hover { border-color: #bbb; color: var(--text); }
  .chip.on-food { background: #fdf0ef; color: var(--food); border-color: #e8b5b2; }
  .chip.on-play { background: #edf4f8; color: var(--play); border-color: #a8c8d8; }
  .chip.on-slot { background: #fdf8ee; color: #8a6200; border-color: #e8d49a; }
  .chip.on-area { background: #f0f0f0; color: #333; border-color: #ccc; }

  .places-list { flex: 1; overflow-y: auto; padding: 8px; }
  .places-list::-webkit-scrollbar { width: 4px; }
  .places-list::-webkit-scrollbar-track { background: transparent; }
  .places-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .place-card { padding: 11px 13px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; margin-bottom: 4px; transition: all 0.15s; }
  .place-card:hover { background: var(--bg); border-color: var(--border); }
  .place-card.active { background: var(--bg); border-color: var(--border); box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .card-top { display: flex; align-items: flex-start; gap: 10px; }
  .card-num { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; margin-top: 1px; }
  .num-food { background: var(--food); color: #fff; }
  .num-play { background: var(--play); color: #fff; }
  .card-info { flex: 1; min-width: 0; }
  .card-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-sub { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
  .tag { font-size: 11px; padding: 2px 7px; border-radius: 10px; }
  .tag-slot { background: #fdf8ee; color: #8a6200; }
  .tag-area { background: #f0f0f0; color: #555; }
  .tag-must { background: #fff8e6; color: #c8860a; }
  .empty-state { padding: 32px 16px; text-align: center; color: var(--muted); font-size: 13px; }

  /* MAP */
  #map { flex: 1; z-index: 1; }

  /* CUSTOM PINS */
  .map-pin { width: 30px; height: 30px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.25); cursor: pointer; transition: transform 0.15s; }
  .map-pin:hover { transform: rotate(-45deg) scale(1.15); }
  .map-pin span { transform: rotate(45deg); }
  .pin-food { background: var(--food); }
  .pin-play { background: var(--play); }

  /* POPUP */
  .leaflet-popup-content-wrapper { border-radius: 10px; padding: 0; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.15); border: 1px solid var(--border); }
  .leaflet-popup-content { margin: 0; width: 280px !important; }
  .leaflet-popup-tip-container { display: none; }
  .popup-inner { font-family: 'Be Vietnam Pro', sans-serif; }
  .popup-imgs { display: flex; gap: 2px; height: 130px; overflow: hidden; }
  .popup-img { flex: 1; object-fit: cover; background: var(--bg); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 12px; }
  .popup-img img { width: 100%; height: 100%; object-fit: cover; }
  .popup-body { padding: 12px 14px; }
  .popup-num-name { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .popup-num { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .popup-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .popup-row { font-size: 12px; color: var(--muted); margin-bottom: 3px; display: flex; gap: 6px; }
  .popup-row strong { color: var(--text); font-weight: 500; }
  .popup-tags { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }

  /* MODAL ADD */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border-radius: 12px; width: 520px; max-height: 85vh; overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,0.2); }
  .modal-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--surface); z-index: 1; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 18px; }
  .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--muted); line-height: 1; padding: 4px; }
  .modal-body { padding: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; display: block; }
  .form-input { width: 100%; font-family: 'Be Vietnam Pro', sans-serif; font-size: 13px; padding: 9px 12px; border: 1px solid var(--border); border-radius: 7px; background: var(--bg); color: var(--text); outline: none; transition: border 0.15s; }
  .form-input:focus { border-color: #aaa; background: #fff; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .category-tabs { display: flex; gap: 8px; }
  .cat-tab { flex: 1; padding: 9px; border-radius: 7px; border: 1px solid var(--border); background: var(--bg); cursor: pointer; text-align: center; font-size: 13px; font-weight: 500; color: var(--muted); transition: all 0.15s; }
  .cat-tab.active-food { background: #fdf0ef; color: var(--food); border-color: #e8b5b2; }
  .cat-tab.active-play { background: #edf4f8; color: var(--play); border-color: #a8c8d8; }
  .slots-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .slot-btn { padding: 7px 4px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); cursor: pointer; text-align: center; font-size: 12px; font-weight: 500; color: var(--muted); transition: all 0.15s; }
  .slot-btn.active { background: #fdf8ee; color: #8a6200; border-color: #e8d49a; }
  .upload-area { border: 2px dashed var(--border); border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.15s; color: var(--muted); font-size: 13px; }
  .upload-area:hover { border-color: #aaa; background: var(--bg); }
  .upload-area input { display: none; }
  .preview-imgs { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .preview-img { width: 64px; height: 64px; border-radius: 6px; object-fit: cover; border: 1px solid var(--border); }
  .map-pick-hint { font-size: 12px; color: var(--muted); background: var(--bg); padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border); }
  .coord-display { font-family: monospace; font-size: 12px; color: var(--text); margin-top: 4px; }
  .modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; position: sticky; bottom: 0; background: var(--surface); }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; z-index: 3000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }

  .count-badge { font-size: 11px; background: var(--bg); color: var(--muted); padding: 2px 7px; border-radius: 10px; border: 1px solid var(--border); }
</style>
</head>
<body>

<header>
  <div class="logo">Phú <span>Yên</span> Map</div>
  <div class="header-actions">
    <span class="count-badge" id="count-badge">0 địa điểm</span>
    <button class="btn btn-primary" onclick="openModal()">+ Thêm địa điểm</button>
  </div>
</header>

<div class="app">
  <div class="sidebar">
    <div class="filter-section">
      <div class="filter-label">Loại</div>
      <div class="filter-row" id="filter-cat">
        <div class="chip" data-type="cat" data-val="food" onclick="toggleFilter(this)">Ăn uống</div>
        <div class="chip" data-type="cat" data-val="play" onclick="toggleFilter(this)">Vui chơi</div>
      </div>
      <div class="filter-label">Khung giờ</div>
      <div class="filter-row" id="filter-slot">
        <div class="chip" data-type="slot" data-val="breakfast" onclick="toggleFilter(this)">Sáng</div>
        <div class="chip" data-type="slot" data-val="lunch" onclick="toggleFilter(this)">Trưa</div>
        <div class="chip" data-type="slot" data-val="afternoon" onclick="toggleFilter(this)">Chiều</div>
        <div class="chip" data-type="slot" data-val="dinner" onclick="toggleFilter(this)">Tối</div>
      </div>
      <div class="filter-label">Khu vực</div>
      <div class="filter-row" id="filter-area"></div>
    </div>
    <div class="places-list" id="places-list"></div>
  </div>
  <div id="map"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Thêm địa điểm mới</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Loại địa điểm</label>
        <div class="category-tabs">
          <div class="cat-tab active-food" id="tab-food" onclick="setCategory('food')">Quán ăn</div>
          <div class="cat-tab" id="tab-play" onclick="setCategory('play')">Điểm tham quan</div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Tên (để trống nếu không có)</label>
          <input class="form-input" id="f-name" placeholder="VD: Quán bún cá Sông Đà">
        </div>
        <div class="form-group">
          <label class="form-label">Khu vực</label>
          <input class="form-input" id="f-area" placeholder="VD: TP Tuy Hoà">
        </div>
      </div>
      <div class="form-group" id="fg-specialty">
        <label class="form-label">Món đặc trưng</label>
        <input class="form-input" id="f-specialty" placeholder="VD: Bún cá thổ">
      </div>
      <div class="form-group" id="fg-must">
        <label class="form-label">Must try</label>
        <input class="form-input" id="f-must" placeholder="VD: Bún cá lá é (thổ)">
      </div>
      <div class="form-group" id="fg-slots">
        <label class="form-label">Thời gian bán</label>
        <div class="slots-grid">
          <div class="slot-btn" data-slot="breakfast" onclick="toggleSlot(this)">Sáng</div>
          <div class="slot-btn" data-slot="lunch" onclick="toggleSlot(this)">Trưa</div>
          <div class="slot-btn" data-slot="afternoon" onclick="toggleSlot(this)">Chiều</div>
          <div class="slot-btn" data-slot="dinner" onclick="toggleSlot(this)">Tối</div>
        </div>
      </div>
      <div class="form-group" id="fg-besttime">
        <label class="form-label">Thời gian đẹp nhất</label>
        <input class="form-input" id="f-besttime" placeholder="VD: 16:00 – 18:00">
      </div>
      <div class="form-group">
        <label class="form-label">Địa chỉ</label>
        <input class="form-input" id="f-address" placeholder="VD: 55 Lương Tấn Thịnh, Tuy Hoà">
      </div>
      <div class="form-group">
        <label class="form-label">Ghi chú</label>
        <input class="form-input" id="f-notes" placeholder="VD: Ngon, ~40k, mở sáng sớm">
      </div>
      <div class="form-group">
        <label class="form-label">Ảnh</label>
        <div class="upload-area" onclick="document.getElementById('f-photos').click()">
          <input type="file" id="f-photos" accept="image/*" multiple onchange="handlePhotos(event)">
          <div>Click để chọn ảnh · Ảnh sẽ tự đọc GPS nếu có</div>
        </div>
        <div class="preview-imgs" id="preview-imgs"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Vị trí trên bản đồ</label>
        <div class="map-pick-hint">Click trực tiếp lên bản đồ để chọn vị trí, hoặc tự động từ GPS ảnh</div>
        <div class="coord-display" id="coord-display">Chưa chọn vị trí</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Huỷ</button>
      <button class="btn btn-primary" onclick="savePlace()">Lưu địa điểm</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const SUPABASE_URL = 'https://dkpntoddzhdoexaynrvj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrcG50b2Rkemhkb2V4YXlucnZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyODIzNTIsImV4cCI6MjA5Mjg1ODM1Mn0.uvt84bABOnEnpB5aQ7SlvVdEwNgauefCw0S2gmRX10o';

const slotLabel = { breakfast:'Sáng', lunch:'Trưa', afternoon:'Chiều', dinner:'Tối' };
let places = [];
let markers = {};
let activeFilters = { cat: new Set(), slot: new Set(), area: new Set() };
let pendingLat = null, pendingLng = null;
let pendingFiles = [];
let currentCategory = 'food';
let activeCardId = null;

// MAP
const map = L.map('map', { zoomControl: true }).setView([13.0955, 109.3185], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap',
  maxZoom: 19
}).addTo(map);

map.on('click', e => {
  if (document.getElementById('modal-overlay').classList.contains('show')) {
    pendingLat = e.latlng.lat.toFixed(6);
    pendingLng = e.latlng.lng.toFixed(6);
    document.getElementById('coord-display').textContent = `${pendingLat}, ${pendingLng}`;
    showToast('Đã chọn vị trí trên bản đồ');
  }
});

// SUPABASE
async function sbFetch(path, opts = {}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1' + path, {
    ...opts,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...opts.headers
    }
  });
  if (!res.ok) { const e = await res.text(); throw new Error(e); }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function loadPlaces() {
  try {
    const data = await sbFetch('/places?select=*,photos(*)&order=number.asc');
    places = data;
    renderAll();
  } catch(e) { showToast('Lỗi tải dữ liệu: ' + e.message); }
}

async function savePlace() {
  if (!pendingLat || !pendingLng) { showToast('Vui lòng chọn vị trí trên bản đồ'); return; }
  const slots = [...document.querySelectorAll('.slot-btn.active')].map(b => b.dataset.slot);
  const maxNum = places.length > 0 ? Math.max(...places.map(p => p.number || 0)) : 0;

  const payload = {
    number: maxNum + 1,
    category: currentCategory,
    name: document.getElementById('f-name').value.trim() || null,
    specialty: document.getElementById('f-specialty').value.trim() || null,
    address: document.getElementById('f-address').value.trim() || null,
    area: document.getElementById('f-area').value.trim() || null,
    meal_slots: slots.length ? slots : null,
    best_time: document.getElementById('f-besttime').value.trim() || null,
    must_try: document.getElementById('f-must').value.trim() || null,
    notes: document.getElementById('f-notes').value.trim() || null,
    lat: parseFloat(pendingLat),
    lng: parseFloat(pendingLng)
  };

  try {
    const [saved] = await sbFetch('/places', { method: 'POST', body: JSON.stringify(payload) });

    // Upload photos
    for (const file of pendingFiles) {
      const ext = file.name.split('.').pop();
      const fname = `${saved.id}_${Date.now()}.${ext}`;
      const upRes = await fetch(`${SUPABASE_URL}/storage/v1/object/place-photos/${fname}`, {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': file.type },
        body: file
      });
      if (upRes.ok) {
        const url = `${SUPABASE_URL}/storage/v1/object/public/place-photos/${fname}`;
        await sbFetch('/photos', { method: 'POST', body: JSON.stringify({ place_id: saved.id, url }) });
      }
    }

    showToast('Đã lưu địa điểm #' + saved.number);
    closeModal();
    loadPlaces();
  } catch(e) { showToast('Lỗi lưu: ' + e.message); }
}

// RENDER
function getFilteredPlaces() {
  return places.filter(p => {
    if (activeFilters.cat.size && !activeFilters.cat.has(p.category)) return false;
    if (activeFilters.slot.size) {
      const slots = p.meal_slots || [];
      if (!slots.some(s => activeFilters.slot.has(s))) return false;
    }
    if (activeFilters.area.size && !activeFilters.area.has(p.area)) return false;
    return true;
  });
}

function renderAll() {
  renderAreaFilters();
  renderSidebar();
  renderMarkers();
  document.getElementById('count-badge').textContent = places.length + ' địa điểm';
}

function renderAreaFilters() {
  const areas = [...new Set(places.map(p => p.area).filter(Boolean))];
  const el = document.getElementById('filter-area');
  el.innerHTML = areas.map(a =>
    `<div class="chip" data-type="area" data-val="${a}" onclick="toggleFilter(this)">${a}</div>`
  ).join('');
}

function renderSidebar() {
  const filtered = getFilteredPlaces();
  const el = document.getElementById('places-list');
  if (!filtered.length) {
    el.innerHTML = '<div class="empty-state">Không có địa điểm nào phù hợp</div>';
    return;
  }
  el.innerHTML = filtered.map(p => {
    const isFood = p.category === 'food';
    const sub = isFood
      ? (p.specialty || p.address || '')
      : (p.best_time || p.area || '');
    const slots = (p.meal_slots || []).map(s => `<span class="tag tag-slot">${slotLabel[s]||s}</span>`).join('');
    const area = p.area ? `<span class="tag tag-area">${p.area}</span>` : '';
    const must = p.must_try ? `<span class="tag tag-must">★ ${p.must_try}</span>` : '';
    return `<div class="place-card${activeCardId===p.id?' active':''}" id="card-${p.id}" onclick="focusPlace(${p.id})">
      <div class="card-top">
        <div class="card-num num-${p.category}">${p.number||'?'}</div>
        <div class="card-info">
          <div class="card-name">${p.name || ('Địa điểm #' + p.number)}</div>
          <div class="card-sub">${sub}</div>
        </div>
      </div>
      <div class="card-tags">${slots}${area}${must}</div>
    </div>`;
  }).join('');
}

function renderMarkers() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  const filtered = getFilteredPlaces();
  filtered.forEach(p => {
    if (!p.lat || !p.lng) return;
    const isFood = p.category === 'food';
    const icon = L.divIcon({
      className: '',
      html: `<div class="map-pin ${isFood?'pin-food':'pin-play'}"><span>${p.number||'?'}</span></div>`,
      iconSize: [30, 30],
      iconAnchor: [15, 30]
    });
    const m = L.marker([p.lat, p.lng], { icon }).addTo(map);
    m.on('click', () => focusPlace(p.id));
    markers[p.id] = m;
  });
}

function focusPlace(id) {
  const p = places.find(x => x.id === id);
  if (!p) return;
  activeCardId = id;
  renderSidebar();

  // scroll card into view
  const card = document.getElementById('card-' + id);
  if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  // pan map
  if (p.lat && p.lng) map.setView([p.lat, p.lng], 15, { animate: true });

  // show popup
  const photos = p.photos || [];
  const imgHtml = photos.length
    ? photos.slice(0,2).map(ph => `<div class="popup-img"><img src="${ph.url}" loading="lazy"/></div>`).join('')
    : `<div class="popup-img" style="background:#f0ede8;height:100px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#aaa">Chưa có ảnh</div>`;

  const slots = (p.meal_slots||[]).map(s=>`<span class="tag tag-slot">${slotLabel[s]||s}</span>`).join('');
  const must = p.must_try ? `<div class="popup-row"><strong>Must try:</strong> ${p.must_try}</div>` : '';
  const specialty = p.specialty ? `<div class="popup-row"><strong>Món:</strong> ${p.specialty}</div>` : '';
  const besttime = p.best_time ? `<div class="popup-row"><strong>Giờ đẹp:</strong> ${p.best_time}</div>` : '';
  const notes = p.notes ? `<div class="popup-row"><strong>Ghi chú:</strong> ${p.notes}</div>` : '';
  const area = p.area ? `<span class="tag tag-area">${p.area}</span>` : '';

  const content = `<div class="popup-inner">
    <div class="popup-imgs" style="height:${photos.length?'120px':'80px'}">${imgHtml}</div>
    <div class="popup-body">
      <div class="popup-num-name">
        <div class="popup-num" style="background:${p.category==='food'?'var(--food)':'var(--play)'}">${p.number}</div>
        <div class="popup-name">${p.name||'Địa điểm #'+p.number}</div>
      </div>
      ${specialty}${must}${besttime}${notes}
      <div class="popup-tags">${slots}${area}</div>
    </div>
  </div>`;

  if (p.lat && p.lng) {
    L.popup({ maxWidth: 300, closeButton: true })
      .setLatLng([p.lat, p.lng])
      .setContent(content)
      .openOn(map);
  }
}

// FILTERS
function toggleFilter(el) {
  const { type, val } = el.dataset;
  const set = activeFilters[type];
  const onClass = type === 'cat'
    ? (val === 'food' ? 'on-food' : 'on-play')
    : type === 'slot' ? 'on-slot' : 'on-area';
  if (set.has(val)) { set.delete(val); el.classList.remove(onClass); }
  else { set.add(val); el.classList.add(onClass); }
  renderSidebar();
  renderMarkers();
}

// MODAL
function openModal() {
  document.getElementById('modal-overlay').classList.add('show');
  setCategory('food');
  pendingLat = null; pendingLng = null; pendingFiles = [];
  document.getElementById('coord-display').textContent = 'Chưa chọn vị trí';
  document.getElementById('preview-imgs').innerHTML = '';
  ['f-name','f-area','f-specialty','f-must','f-address','f-notes','f-besttime'].forEach(id => document.getElementById(id).value = '');
  document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('active'));
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }
function closeModalOutside(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

function setCategory(cat) {
  currentCategory = cat;
  document.getElementById('tab-food').className = 'cat-tab' + (cat==='food'?' active-food':'');
  document.getElementById('tab-play').className = 'cat-tab' + (cat==='play'?' active-play':'');
  document.getElementById('fg-specialty').style.display = cat==='food' ? '' : 'none';
  document.getElementById('fg-must').style.display = cat==='food' ? '' : 'none';
  document.getElementById('fg-slots').style.display = cat==='food' ? '' : 'none';
  document.getElementById('fg-besttime').style.display = cat==='play' ? '' : 'none';
}

function toggleSlot(el) {
  el.classList.toggle('active');
}

// PHOTOS
function handlePhotos(e) {
  const files = [...e.target.files];
  pendingFiles = files;
  const preview = document.getElementById('preview-imgs');
  preview.innerHTML = '';

  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = document.createElement('img');
      img.src = ev.target.result;
      img.className = 'preview-img';
      preview.appendChild(img);
    };
    reader.readAsDataURL(file);

    // Try read EXIF GPS
    readEXIF(file).then(coords => {
      if (coords && !pendingLat) {
        pendingLat = coords.lat.toFixed(6);
        pendingLng = coords.lng.toFixed(6);
        document.getElementById('coord-display').textContent = `${pendingLat}, ${pendingLng} (từ GPS ảnh)`;
        showToast('Đã đọc toạ độ từ GPS ảnh');
      }
    });
  });
}

function readEXIF(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const view = new DataView(e.target.result);
        if (view.getUint16(0) !== 0xFFD8) return resolve(null);
        let offset = 2;
        while (offset < view.byteLength) {
          if (view.getUint16(offset) === 0xFFE1) {
            const exifData = new DataView(e.target.result, offset + 4);
            const littleEndian = exifData.getUint16(6) === 0x4949;
            const ifdOffset = exifData.getUint32(10, littleEndian) + 6;
            const entries = exifData.getUint16(ifdOffset, littleEndian);
            let gpsOffset = null;
            for (let i = 0; i < entries; i++) {
              const tag = exifData.getUint16(ifdOffset + 2 + i * 12, littleEndian);
              if (tag === 0x8825) gpsOffset = exifData.getUint32(ifdOffset + 2 + i * 12 + 8, littleEndian) + 6;
            }
            if (!gpsOffset) return resolve(null);
            const gpsEntries = exifData.getUint16(gpsOffset, littleEndian);
            let latRef, lat, lngRef, lng;
            for (let i = 0; i < gpsEntries; i++) {
              const tag = exifData.getUint16(gpsOffset + 2 + i * 12, littleEndian);
              const valOff = exifData.getUint32(gpsOffset + 2 + i * 12 + 8, littleEndian) + 6;
              if (tag === 1) latRef = String.fromCharCode(exifData.getUint8(gpsOffset + 2 + i * 12 + 8));
              if (tag === 3) lngRef = String.fromCharCode(exifData.getUint8(gpsOffset + 2 + i * 12 + 8));
              if (tag === 2) lat = readRational3(exifData, valOff, littleEndian);
              if (tag === 4) lng = readRational3(exifData, valOff, littleEndian);
            }
            if (lat && lng) {
              const latD = lat[0] + lat[1]/60 + lat[2]/3600;
              const lngD = lng[0] + lng[1]/60 + lng[2]/3600;
              return resolve({ lat: latRef==='S'?-latD:latD, lng: lngRef==='W'?-lngD:lngD });
            }
            return resolve(null);
          }
          offset += 2 + view.getUint16(offset + 2);
        }
        resolve(null);
      } catch { resolve(null); }
    };
    reader.readAsArrayBuffer(file);
  });
}

function readRational3(view, offset, le) {
  return [
    view.getUint32(offset, le) / view.getUint32(offset+4, le),
    view.getUint32(offset+8, le) / view.getUint32(offset+12, le),
    view.getUint32(offset+16, le) / view.getUint32(offset+20, le)
  ];
}

// TOAST
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// INIT
loadPlaces();
</script>
